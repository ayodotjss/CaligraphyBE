name: Render Keepalive

on:
  schedule:
    - cron: "*/11 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    name: Ping Render service
    runs-on: ubuntu-latest
    timeout-minutes: 2

    env:
      RENDER_PING_URL: https://caligraphybe.onrender.com/health

    steps:
      - name: Check ping URL
        shell: bash
        run: |
          if [ -z "$RENDER_PING_URL" ]; then
            echo "Set RENDER_PING_URL in .github/workflows/render-keepalive.yml."
            exit 1
          fi

      - name: Ping Render
        shell: bash
        run: |
          curl --fail --silent --show-error --max-time 20 --retry 2 --retry-delay 5 "$RENDER_PING_URL"
